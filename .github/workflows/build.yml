name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: Flashcards-Windows
          path: |
            dist/*.exe
            dist/win-unpacked/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac
      - uses: actions/upload-artifact@v4
        with:
          name: Flashcards-macOS
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux
      - uses: actions/upload-artifact@v4
        with:
          name: Flashcards-Linux
          path: dist/*.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Flashcards-Windows/*.exe
            artifacts/Flashcards-macOS/*.dmg
            artifacts/Flashcards-Linux/*.AppImage
          draft: true
